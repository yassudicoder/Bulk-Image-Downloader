<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lazy Infinite-Scroll Blog — Bulk Image Downloader fixture</title>
<!--
  ============================================================================
  FIXTURE: lazy-scroll-blog.html
  PURPOSE: Simulate an infinite-scroll / lazy-loaded blog.
    - Tall page (min-height ~8400px; well over the required ~6000px).
    - 30 images that START with only a lazy attribute and NO src:
        data-src         (10 images)
        data-original    (10 images)
        data-lazy-src    (10 images)
    - An IntersectionObserver swaps the lazy attr -> src as each image scrolls
      into view (so real src appears only after scrolling).

  WHAT IT TESTS:
    1. Lazy-attribute DISCOVERY before load: at initial scan (before any scroll)
       the scanner should find all 30 via data-src / data-original /
       data-lazy-src.                              -> sourceType: lazy
    2. "Scan full page" scroll nudge: scrolling to the bottom loads the images
       (they gain a real src / currentSrc), so a second pass still finds 30 and
       can now read real naturalWidth/Height.

  EXPECTED CANDIDATE COUNT: 30 (all lazy). Images are spaced down the page.
  ============================================================================
-->
<style>
  html { min-height: 6000px; }
  body { font-family: Georgia, serif; max-width: 760px; margin: 0 auto;
         padding: 24px; line-height: 1.6; color: #222; }
  h1 { text-align: center; }
  .post { min-height: 220px; margin: 0 0 120px; padding-bottom: 24px;
          border-bottom: 1px solid #eee; }
  .post h2 { margin-bottom: 4px; }
  .post .lazyimg { display: block; width: 480px; max-width: 100%; height: 300px;
                   object-fit: cover; background: repeating-linear-gradient(
                     45deg, #f0f0f0, #f0f0f0 10px, #e6e6e6 10px, #e6e6e6 20px);
                   border: 1px solid #ddd; }
  .status { position: fixed; top: 8px; right: 8px; background: #222; color: #fff;
            font-family: system-ui, sans-serif; font-size: 12px; padding: 6px 10px;
            border-radius: 4px; z-index: 10; }
</style>
</head>
<body>
  <div class="status" id="status">loaded 0 / 30</div>
  <h1>The Endless Scroll — a lazy blog</h1>
  <p style="text-align:center;color:#777">Scroll down: images load as they enter the viewport.</p>
  <div id="feed"></div>

  <script>
  (function () {
    "use strict";
    function svgURI(w, h, hex, label) {
      var fs = Math.max(14, Math.round(Math.min(w, h) / 8));
      var svg =
        "%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20width=%22" + w + "%22%20height=%22" + h + "%22%3E" +
        "%3Crect%20width=%22100%25%22%20height=%22100%25%22%20fill=%22%23" + hex + "%22/%3E" +
        "%3Ctext%20x=%2250%25%22%20y=%2250%25%22%20font-family=%22sans-serif%22%20font-size=%22" + fs +
        "%22%20fill=%22%23ffffff%22%20text-anchor=%22middle%22%20dominant-baseline=%22middle%22%3E" +
        encodeURIComponent(label) +
        "%3C/text%3E%3C/svg%3E";
      return "data:image/svg+xml," + svg;
    }

    var LAZY_ATTRS = ["data-src", "data-original", "data-lazy-src"];
    var palette = ["e6194b", "3cb44b", "4363d8", "f58231", "911eb4",
                   "008080", "9a6324", "800000", "1971c2", "5f3dc4"];
    var COUNT = 30;
    var feed = document.getElementById("feed");
    var statusEl = document.getElementById("status");
    var loaded = 0;

    for (var i = 0; i < COUNT; i++) {
      var post = document.createElement("section");
      post.className = "post";

      var h2 = document.createElement("h2");
      h2.textContent = "Post #" + (i + 1) + " — lorem ipsum dolor";
      post.appendChild(h2);

      var p = document.createElement("p");
      p.textContent = "Nulla facilisi. Integer at massa non urna finibus pretium. " +
        "Curabitur euismod sapien vitae faucibus tempor, nunc mauris hendrerit justo.";
      post.appendChild(p);

      // Lazy image: real URL lives ONLY in the lazy attribute, no src yet.
      var attr = LAZY_ATTRS[i % LAZY_ATTRS.length];
      var img = document.createElement("img");
      img.className = "lazyimg";
      img.setAttribute("data-idx", String(i));
      img.setAttribute(attr, svgURI(960, 600, palette[i % palette.length], "post-" + (i + 1) + ".jpg"));
      img.alt = "Lazy image for post " + (i + 1);
      post.appendChild(img);

      feed.appendChild(post);
    }

    // IntersectionObserver swaps the lazy attribute into src on first view.
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (!entry.isIntersecting) return;
        var img = entry.target;
        var real = img.getAttribute("data-src") ||
                   img.getAttribute("data-original") ||
                   img.getAttribute("data-lazy-src");
        if (real && !img.src) {
          img.src = real;
          loaded++;
          statusEl.textContent = "loaded " + loaded + " / " + COUNT;
        }
        io.unobserve(img);
      });
    }, { rootMargin: "100px" });

    document.querySelectorAll(".lazyimg").forEach(function (img) { io.observe(img); });
  })();
  </script>
</body>
</html>
