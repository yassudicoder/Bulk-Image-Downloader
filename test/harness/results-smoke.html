<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Results smoke harness</title>
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/base.css">
  <link rel="stylesheet" href="../../results/results.css">
  <script>
    /* DEV harness (excluded from build): stub chrome.* + seed a scan, then load the REAL
       results scripts and markup so the whole controller runs end-to-end offline. */
    (function () {
      // Load en messages synchronously so getMessage can be sync like the real API.
      const xhr = new XMLHttpRequest();
      xhr.open('GET', '/_locales/en/messages.json', false); xhr.send();
      const MSG = JSON.parse(xhr.responseText);
      function getMessage(key, subs) {
        const e = MSG[key]; if (!e) return '';
        let m = e.message;
        if (e.placeholders) for (const [n, d] of Object.entries(e.placeholders)) m = m.split('$' + n + '$').join(d.content);
        const arr = subs == null ? [] : (Array.isArray(subs) ? subs : [subs]);
        return m.replace(/\$(\d+)/g, (_, d) => (arr[d - 1] != null ? arr[d - 1] : ''));
      }

      const sessionStore = {}, localStore = {};
      function mkStore(store) {
        return {
          get(keys) {
            const out = {};
            const arr = keys == null ? Object.keys(store) : (Array.isArray(keys) ? keys : [keys]);
            for (const k of arr) if (k in store) out[k] = store[k];
            return Promise.resolve(out);
          },
          set(obj) { Object.assign(store, obj); return Promise.resolve(); },
        };
      }

      window.__downloads = [];
      let dlId = 1;
      window.chrome = {
        i18n: { getMessage, getUILanguage: () => 'en-US' },
        storage: { session: mkStore(sessionStore), local: mkStore(localStore) },
        runtime: { sendMessage: () => Promise.resolve({ ok: false }), openOptionsPage() {}, lastError: undefined },
        tabs: { create() {}, getCurrent(cb) { cb({ id: 1 }); }, remove() {} },
        downloads: { download(opts, cb) { window.__downloads.push(opts); cb(dlId++); } },
      };

      // Seed a scan with mixed sources / types / domains.
      const svg = (w, h, c) => "data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='" + w + "'%20height='" + h + "'%3E%3Crect%20width='100%25'%20height='100%25'%20fill='" + c + "'/%3E%3C/svg%3E";
      const page = 'https://shop.example.com/listing/42';
      const candidates = [
        { id: 'c0', url: 'http://cdn.shop.example/hero.jpg', sourceType: 'img', naturalWidth: 1200, naturalHeight: 800, displayWidth: 0, displayHeight: 0, alt: 'Hero product photo', domIndex: 0, filename: 'hero.jpg', ext: 'jpg', pageUrl: page },
        { id: 'c1', url: 'http://cdn.shop.example/icon.png', sourceType: 'img', naturalWidth: 64, naturalHeight: 64, displayWidth: 0, displayHeight: 0, alt: '', domIndex: 1, filename: 'icon.png', ext: 'png', pageUrl: page },
        { id: 'c2', url: 'http://img.other.example/logo.webp', sourceType: 'background', naturalWidth: 0, naturalHeight: 0, displayWidth: 500, displayHeight: 500, alt: 'logo', domIndex: 2, filename: 'logo.webp', ext: 'webp', pageUrl: page },
        { id: 'c3', url: svg(800, 600, '%230d9488'), sourceType: 'srcset', naturalWidth: 800, naturalHeight: 600, displayWidth: 0, displayHeight: 0, alt: 'sale banner', domIndex: 3, filename: '', ext: 'svg', pageUrl: page },
        { id: 'c4', url: svg(300, 300, '%23dc2626'), sourceType: 'shadow', naturalWidth: 300, naturalHeight: 300, displayWidth: 0, displayHeight: 0, alt: '', domIndex: 4, filename: '', ext: 'svg', pageUrl: page },
        { id: 'c5', url: 'http://cdn.shop.example/banner.jpg', sourceType: 'img', naturalWidth: 900, naturalHeight: 300, displayWidth: 0, displayHeight: 0, alt: 'sale banner wide', domIndex: 5, filename: 'banner.jpg', ext: 'jpg', pageUrl: page },
      ];
      sessionStore['scan:SMOKE'] = { ok: true, pageUrl: page, pageTitle: 'Listing 42', scannedAt: 1, fullPage: false, stats: { durationMs: 12, rawFound: 6, afterUrlDedupe: 6 }, scanId: 'SMOKE', sourceTabId: 1, candidates };

      // Inject the REAL results markup (minus its <script> tags), then load the real scripts.
      const rx = new XMLHttpRequest(); rx.open('GET', '/results/results.html', false); rx.send();
      const doc = new DOMParser().parseFromString(rx.responseText, 'text/html');
      const srcs = [...doc.querySelectorAll('body script')].map((s) => s.getAttribute('src'));
      doc.querySelectorAll('body script').forEach((s) => s.remove());

      window.addEventListener('DOMContentLoaded', () => {
        document.body.innerHTML = doc.body.innerHTML;
        const mapSrc = (s) => s.startsWith('../') ? s.replace('../', '/') : '/results/' + s;
        (function seq(i) {
          if (i >= srcs.length) return;
          const el = document.createElement('script');
          el.src = mapSrc(srcs[i]);
          el.onload = () => seq(i + 1);
          document.body.appendChild(el);
        })(0);
      });
    })();
  </script>
</head>
<body></body>
</html>
