<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title data-i18n="popupTitle">Bulk Image Downloader</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../shared/base.css">
  <link rel="stylesheet" href="popup.css">
  <script src="../shared/theme.js"></script>
</head>
<body>
  <div class="bid-popup">
    <header class="bid-popup__head">
      <img src="../assets/icons/icon-32.png" width="22" height="22" alt="">
      <span data-i18n="popupTitle">Bulk Image Downloader</span>
    </header>

    <div class="bid-popup__body">
      <!-- Scanning -->
      <div id="stateLoading" class="bid-popup__state">
        <div class="bid-popup__spinner" role="status"></div>
        <p id="loadingText" class="bid-muted" data-i18n="popupScanning">Scanning this page…</p>
      </div>

      <!-- Result -->
      <div id="stateResult" class="bid-popup__state" hidden>
        <p id="countLine" class="bid-popup__count"><strong id="countNum">0</strong> <span id="countText"></span></p>
        <p id="hostLine" class="bid-popup__sub" hidden></p>
        <p id="noImages" class="bid-popup__sub" data-i18n="popupNoImages" hidden>No images found here. Some load only as you scroll — try a full-page scan.</p>
        <div class="bid-popup__actions">
          <button id="viewResults" class="bid-btn bid-btn--primary" data-i18n="popupViewResults">View Results</button>
          <button id="scanFull" class="bid-btn" data-i18n="popupScanFull">Scan Full Page</button>
        </div>
      </div>

      <!-- Restricted -->
      <div id="stateRestricted" class="bid-popup__state" hidden>
        <div class="bid-popup__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.9" y1="4.9" x2="19.1" y2="19.1"/></svg>
        </div>
        <p class="bid-muted" data-i18n="popupRestricted">This page can't be scanned. Browser pages and the Web Store are off-limits to all extensions.</p>
      </div>

      <!-- Error -->
      <div id="stateError" class="bid-popup__state" hidden>
        <p class="bid-muted" data-i18n="popupError">Couldn't scan this page.</p>
        <button id="retry" class="bid-btn bid-btn--sm" data-i18n="popupRetry">Try again</button>
      </div>
    </div>

    <div class="bid-popup__note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
      <span data-i18n="popupPrivacyNote">We only read this tab when you click the icon.</span>
    </div>

    <footer class="bid-popup__foot">
      <button id="settingsBtn" class="bid-btn bid-btn--ghost bid-btn--sm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span data-i18n="popupSettings">Settings</span>
      </button>
      <button id="helpBtn" class="bid-btn bid-btn--ghost bid-btn--sm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span data-i18n="popupHelp">Help</span>
      </button>
    </footer>
  </div>

  <script src="../shared/i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
